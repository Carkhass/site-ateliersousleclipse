name: Update Instagram Gallery (JS Mode)
on:
  schedule:
    - cron: '0 */12 * * *' # S'exécute toutes les 12h
  workflow_dispatch: # Bouton manuel pour tester

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Recupération via ig-scraper
        run: |
          mkdir -p src/data
          npm install ig-scraper
          
          # Script Node.js pour extraire les données
          node -e "
          const scraper = require('ig-scraper');
          const fs = require('fs');

          async function getFeed() {
            try {
              // On récupère les posts du profil public
              const posts = await scraper.get_profile_posts('ateliersousleclipse');
              
              if (!posts || posts.length === 0) {
                console.error('Aucun post trouvé ou profil bloqué');
                process.exit(1);
              }

              const formattedPosts = posts.slice(0, 21).map(post => ({
                id: post.shortcode,
                url: post.display_url,
                caption: post.caption || 'Couteau artisanal - Atelier Sous l\'Éclipse',
                link: 'https://www.instagram.com/p/' + post.shortcode,
                timestamp: post.timestamp
              }));

              fs.writeFileSync('src/data/instagram.json', JSON.stringify(formattedPosts, null, 2));
              console.log('Fichier instagram.json créé avec ' + formattedPosts.length + ' posts.');
            } catch (err) {
              console.error('Erreur lors du scraping :', err);
              process.exit(1);
            }
          }

          getFeed();
          "

      - name: Commit et Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          # On n'ajoute que le JSON car on utilise les URLs directes d'Instagram ici
          git add src/data/instagram.json
          git commit -m "Auto-update Instagram Feed (JS Scraper)" || echo "Pas de changements"
          git push